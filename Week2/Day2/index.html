<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第2周 Day2 - 7 种图元模式</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d1117;
      color: #e6edf3;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    #glCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .panel {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 13px;
      line-height: 1.45;
      max-width: 560px;
    }

    .panel p {
      margin: 4px 0;
    }

    #modeButtons {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    #modeButtons button {
      padding: 5px 9px;
      font-size: 12px;
      color: #e6edf3;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      cursor: pointer;
    }

    #modeButtons button:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    #modeButtons button.active {
      background: #2f81f7;
      border-color: #2f81f7;
      color: #fff;
    }

    .ok {
      color: #3fb950;
    }

    .err {
      color: #ff7b72;
    }
  </style>
</head>
<body>
  <!-- 第2周 Day2 学习目标：7 种图元模式
    同一组顶点，用不同的 drawArrays mode 连成不同图形：
    POINTS / LINES / LINE_STRIP / LINE_LOOP / TRIANGLES / TRIANGLE_STRIP / TRIANGLE_FAN
  -->
  <canvas id="glCanvas"></canvas>
  <div class="panel">
    <p><strong>第2周 Day2 目标：</strong>7 种图元模式（可切换展示）</p>
    <p id="statusText">状态：初始化中...</p>
    <p id="tipText">提示：点击下面的按钮切换图元模式，观察同一组 7 个顶点的连法变化。</p>
    <div id="modeButtons"></div>
  </div>
  <!-- main.js 使用 import（复用 ../../shared/gl-utils.js），需 type="module" + http 打开 -->
  <script type="module" src="./main.js"></script>
</body>
</html>
